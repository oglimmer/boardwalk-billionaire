apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boardwalk.fullname" . }}-backend
  labels:
    {{- include "boardwalk.labels" . | nindent 4 }}
    {{- include "boardwalk.backendSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "boardwalk.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boardwalk.backendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-sa" (include "boardwalk.fullname" .)) }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: {{ .Values.backend.env.JAVA_OPTS | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
