apiVersion: v1
kind: Service
metadata:
  name: {{ include "boardwalk.fullname" . }}-backend
  labels:
    {{- include "boardwalk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "boardwalk.backendSelectorLabels" . | nindent 4 }}
